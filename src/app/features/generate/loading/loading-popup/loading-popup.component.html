@if (show) {
  <div class="popup-overlay" (click)="close()">
    <div
      class="popup-box"
      (click)="$event.stopPropagation()"
      role="dialog"
      aria-modal="true"
      aria-labelledby="popup-title"
    >
      <button type="button" class="popup-close" (click)="close()" aria-label="Close">✕</button>

      <h2 class="popup-title" id="popup-title">{{ errorTitle }}</h2>

      <p class="popup-body">{{ errorMessage }}</p>

      <button type="button" class="popup-btn" (click)="goBack()">Go to cookbook →</button>
    </div>
  </div>
}
