@if (show) {
  <div class="popup-overlay" (click)="close()">
    <div
      class="popup-box"
      (click)="$event.stopPropagation()"
      role="dialog"
      aria-modal="true"
      aria-labelledby="popup-title"
    >
      <button type="button" class="popup-close" (click)="close()" aria-label="Close">✕</button>

      <h2 class="popup-title" id="popup-title">Ups! Not quite enough...</h2>

      <p class="popup-body">
        It looks like some ingredient quantities aren't sufficient
        for your selected servings. Please add or adjust quantities and try again.
      </p>

      <button type="button" class="popup-btn" (click)="goBack()">Go back and adjust →</button>
    </div>
  </div>
}
