<article class="card" [routerLink]="['/recipe', recipe.id]">
  <header class="card__header">
    <div class="card__badges">
      <span class="card__badge card__badge--style">{{ styleLabel }}</span>
      <span class="card__badge card__badge--time">{{ timeLabel }}</span>
    </div>
    <h2 class="card__title">{{ recipe.title }}</h2>
    <p class="card__calories">~{{ recipe.nutrition.caloriesPerPortion }} kcal / Portion</p>
  </header>

  <section class="card__ingredients">
    <h3 class="card__section-title">Verwendete Zutaten</h3>
    <ul class="card__ingredient-list">
      <li *ngFor="let ing of recipe.ingredients.slice(0, 5)" class="card__ingredient card__ingredient--available">
        ✓ {{ ing.name }}
      </li>
    </ul>
  </section>

  <section class="card__missing" *ngIf="topMissing.length > 0">
    <h3 class="card__section-title">Fehlende Zutaten</h3>
    <ul class="card__ingredient-list">
      <li *ngFor="let name of topMissing" class="card__ingredient card__ingredient--missing">
        + {{ name }}
      </li>
    </ul>
  </section>

  <footer class="card__footer">
    <span class="card__servings">{{ recipe.servings }} Portionen</span>
    <span class="card__cta">Rezept ansehen →</span>
  </footer>
</article>
