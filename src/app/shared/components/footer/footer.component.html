<footer class="footer">
  <div class="footer__inner">

    <!-- Brand -->
    <div class="footer__brand">
      <a routerLink="/" class="footer__logo-link" aria-label="Home">
        <picture>
          <source type="image/webp" srcset="assets/images/logo-cuisine.webp" />
          <img src="assets/images/logo-cuisine.png" alt="Code à Cuisine" class="footer__logo" loading="lazy" decoding="async" />
        </picture>
      </a>
      <p class="footer__tagline">AI-powered recipe generation</p>
    </div>

    <!-- Navigation -->
    <nav class="footer__nav" aria-label="Footer Navigation">
      <a routerLink="/generate" class="footer__link">Create Recipe</a>
      <a routerLink="/cookbook" class="footer__link">Cookbook</a>
      <a routerLink="/legal"    class="footer__link">Legal Notice</a>
      <a routerLink="/privacy"  class="footer__link">Privacy Policy</a>
    </nav>

  </div>

  <!-- Bottom bar -->
  <div class="footer__bottom">
    <p class="footer__copy">&copy; {{ year }} Code à Cuisine &mdash; Powered by <a href="https://dimit.cc" target="_blank" rel="noopener noreferrer">Dimit</a></p>
